spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/library
    username: library
    password: library123
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/library
          jwk-set-uri: http://localhost:8180/realms/library/protocol/openid-connect/certs

server:
  port: 8080